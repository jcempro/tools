<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversor Universal de Modelos de Dados CSV</title>
    <link rel="stylesheet" href="/assets/css/documentos.css" />
    <link rel="stylesheet" href="/csv-bd/bd.css" />
    <script src="/assets/js/documentos.js"></script>
    <script defer src="/assets/js/consent.js"></script>
    <script src="/csv-bd/bd.js"></script>
  </head>

  <body>
    <div data-jcem-actions hidden>
      <button type="button" class="ico csv-open">Abrir CSV</button>
      <button type="button" class="ico csv-download">Baixar CSV convertido</button>
      <button type="button" class="ico clear">Limpar</button>
      <a
        class="ico bundle"
        href="/csv-bd/csv-bd.bundle.zip"
        download
        hidden
        data-bundle-download
        >Bundle offline</a
      >
    </div>

    <main class="bd-app" aria-labelledby="bd-title">
      <section class="module-intro" aria-labelledby="bd-title">
        <h1 id="bd-title">Conversor de modelos CSV</h1>
        <p>
          Transformação local, offline e rastreável entre linhas por cliente e
          linhas por telefone.
        </p>
      </section>

      <section class="workspace" aria-label="Conversor">
        <form class="panel controls" id="bd-form">
          <fieldset>
            <legend>Entrada</legend>
            <label for="csv-file">Arquivo CSV</label>
            <input
              id="csv-file"
              type="file"
              accept=".csv,text/csv,text/plain"
            />

            <label for="csv-text">Conteudo CSV</label>
            <textarea
              id="csv-text"
              spellcheck="false"
              placeholder="Cole aqui o CSV ou selecione um arquivo."
            ></textarea>
          </fieldset>

          <fieldset>
            <legend>Modelos</legend>
            <div class="direction-grid">
              <label>
                <span>Origem</span>
                <select id="source-model" disabled>
                  <option value="modelo1">Modelo 1: cliente por linha</option>
                  <option value="modelo2">Modelo 2: telefone por linha</option>
                </select>
              </label>

              <label>
                <span>Destino</span>
                <select id="target-model" disabled>
                  <option value="modelo2">Modelo 2: telefone por linha</option>
                  <option value="modelo1">Modelo 1: cliente por linha</option>
                </select>
              </label>
            </div>

            <label for="identifier-columns"
              >Identificadores por prioridade; inclua id apenas para preserva-lo</label
            >
            <input id="identifier-columns" type="text" value="MCI, CID, MGI" />
          </fieldset>

          <div class="actions">
            <button type="button" id="convert">Converter</button>
            <button type="button" id="clear">Limpar</button>
            <button type="button" id="download" disabled>Baixar CSV</button>
          </div>
        </form>

        <section class="panel output" aria-label="Resultado">
          <div class="summary-grid" id="summary">
            <div><strong>Origem</strong><span>-</span></div>
            <div><strong>Destino</strong><span>-</span></div>
            <div><strong>Linhas</strong><span>0</span></div>
            <div><strong>Colunas</strong><span>0</span></div>
          </div>

          <div id="decisions" class="decisions" hidden></div>

          <label for="csv-output">CSV convertido</label>
          <textarea id="csv-output" spellcheck="false" readonly></textarea>
        </section>
      </section>

      <section class="panel log-panel" aria-label="Logs">
        <div class="log-header">
          <h2>Logs</h2>
          <button type="button" id="copy-log">Copiar</button>
        </div>
        <ol id="logs" aria-live="polite"></ol>
      </section>
    </main>
  </body>
</html>
