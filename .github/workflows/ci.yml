name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  validate:
    outputs:
      should-deploy: ${{ steps.publish.outputs.should-deploy }}
      artifact-path: ${{ steps.publish.outputs.artifact-path }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --prefer-offline --no-audit --fund=false
      - id: publish
        name: Build, validate and prepare publication
        run: npm run publish:pages
        env:
          JCEM_BUILD_VERSION: ${{ github.sha }}
      - uses: actions/configure-pages@v6
        if: steps.publish.outputs.should-deploy == 'true'
      - uses: actions/upload-pages-artifact@v5
        if: steps.publish.outputs.should-deploy == 'true'
        with:
          path: ${{ steps.publish.outputs.artifact-path }}
          include-hidden-files: true

  deploy:
    if: needs.validate.outputs.should-deploy == 'true'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
