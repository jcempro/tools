<!DOCTYPE html>
<HTML lang="pt-BR">

<HEAD>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <TITLE>Calculadora rápida de dízimo</TITLE>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/zepto/1.2.0/zepto.min.js"
    integrity="sha512-BrvVYNhKh6yST24E5DY/LopLO5d+8KYmIXyrpBIJ2PK+CyyJw/cLSG/BfJomWLC1IblNrmiJWGlrGueKLd/Ekw=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="assets/js/main.js"></script>

  <!-- RICH SNIPPETYS :: END -->
  <!-- ESTILOS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/v5-font-face.min.css"
    integrity="sha512-W+lqPhhunEwz9brBt8usGl0j+mtLGggjFC/9RHzyFyDKe/SSkCgQ08Y9ZZSNYez5biH7IhJU66+iUiQagtSm8w=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="assets/css/boot.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <!-- JAVASCRIPTS -->


</HEAD>

<body>

  <!-- CALC -->
  <section class="global">
    <section class='calculadora form'>
      <div class="mainpanel colunabarra">
        <div>
          <div class='input tt Text title'><input name='tt' placeholder='Título' type='text' inputmode='numeric' f='pm'
              class='title' min='0' inner='<i class="go result"></i>' /><i class="go result"></i></div>

          <div class='input pv currency recebimentos coin'><input name='pv' placeholder='Proventos' type='currency'
              inputmode='numeric' f='pm' class='recebimentos coin' min='0' inner='<i class="go result">Prov.</i>' /><i
              class="go result">Prov.</i></div>
          <div class='input ac currency recebimentos coin'><input name='ac' placeholder='Acerto' type='currency'
              inputmode='numeric' f='pm' class='recebimentos coin' min='0' inner='<i class="go result">Acerto</i>' /><i
              class="go result">Acerto</i></div>
          <div class='input al currency recebimentos coin'><input name='al' placeholder='Alimentação' type='currency'
              inputmode='numeric' f='pm' class='recebimentos coin' min='0'
              inner='<i class="go result">Aliment.</i>' /><i class="go result">Aliment.</i></div>
          <div class='input rf currency recebimentos coin'><input name='rf' placeholder='Refeição' type='currency'
              inputmode='numeric' f='pm' class='recebimentos coin' min='0'
              inner='<i class="go result">Refeição</i>' /><i class="go result">Refeição</i></div>
          <div class='input pv currency recebimentos coin'><input name='pv' placeholder='Outros' type='currency'
              inputmode='numeric' f='pm' class='recebimentos coin' min='0' inner='<i class="go result">Prov.</i>' /><i
              class="go result">Outros</i></div>
          <div class="avancado">
            <div class="cfg">
              <br />
              <div class='input rc currency rc'><input name='rc' placeholder='Recebimentos' type='currency'
                  inputmode='decimal' class='rc' readonly='1' step='0.1' min='0.1' max='10'
                  inner='<i class="go result"></i>' /><i class="go result"></i></div>
              <hr />
              <div class='input of Number of'><input name='of' placeholder='Oferta/Pacto (1%)' type='number'
                  inputmode='decimal' class='of' step='0.1' min='0.1' max='10' inner='<i class="go result"></i>' /><i
                  class="go result"></i></div>
              <div class='input cd Number cd'><input name='cd' placeholder='Correção do Dizimo (7%)' type='number'
                  inputmode='decimal' class='cd' step='0.1' min='0.1' max='10' inner='<i class="go result"></i>' /><i
                  class="go result"></i></div>
              <div class='input dz Text dz'><input name='dz' placeholder='Dizimo' type='text' readonly='1'
                  inputmode='decimal' class='dz' inner='<i class="go result"></i>' /><i class="go result"></i></div>
              <div class='input dc Text dc'><input name='dc' placeholder='Dizimo Corrigido' type='text' readonly='1'
                  inputmode='decimal' class='dc' inner='<i class="go result"></i>' /><i class="go result"></i></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </section>
  <!-- /CALC -->
</body>

</HTML>
