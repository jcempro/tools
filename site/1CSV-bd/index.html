<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor Universal de Modelos de Dados CSV</title>
  <link rel="stylesheet" href="/tools/bd/bd.css">
  <script src="/tools/bd/bd.js"></script>
</head>

<body>
  <main class="bd-app" aria-labelledby="bd-title">
    <header class="bd-header">
      <div>
        <h1 id="bd-title">Conversor de modelos CSV</h1>
        <p>Transformação local, offline e rastreável entre linhas por cliente e linhas por telefone.</p>
      </div>
      <a class="bundle-link bundle" href="/tools/bd/bd.bundle.zip" download hidden data-bundle-download>Bundle offline</a>
    </header>

    <section class="workspace" aria-label="Conversor">
      <form class="panel controls" id="bd-form">
        <fieldset>
          <legend>Entrada</legend>
          <label for="csv-file">Arquivo CSV</label>
          <input id="csv-file" type="file" accept=".csv,text/csv,text/plain">

          <label for="csv-text">Conteudo CSV</label>
          <textarea id="csv-text" spellcheck="false" placeholder="Cole aqui o CSV ou selecione um arquivo."></textarea>
        </fieldset>

        <fieldset>
          <legend>Modelos</legend>
          <div class="direction-grid">
            <label>
              <span>Origem</span>
              <select id="source-model">
                <option value="modelo1">Modelo 1: cliente por linha</option>
                <option value="modelo2">Modelo 2: telefone por linha</option>
              </select>
            </label>

            <label>
              <span>Destino</span>
              <select id="target-model">
                <option value="modelo2">Modelo 2: telefone por linha</option>
                <option value="modelo1">Modelo 1: cliente por linha</option>
              </select>
            </label>
          </div>

          <label for="identifier-columns">Identificadores por prioridade</label>
          <input id="identifier-columns" type="text" value="MCI, CID, MGI">
        </fieldset>

        <div class="actions">
          <button type="button" id="convert">Converter</button>
          <button type="button" id="swap">Inverter</button>
          <button type="button" id="clear">Limpar</button>
          <button type="button" id="download" disabled>Baixar CSV</button>
        </div>
      </form>

      <section class="panel output" aria-label="Resultado">
        <div class="summary-grid" id="summary">
          <div><strong>Origem</strong><span>-</span></div>
          <div><strong>Destino</strong><span>-</span></div>
          <div><strong>Linhas</strong><span>0</span></div>
          <div><strong>Colunas</strong><span>0</span></div>
        </div>

        <div id="decisions" class="decisions" hidden></div>

        <label for="csv-output">CSV convertido</label>
        <textarea id="csv-output" spellcheck="false" readonly></textarea>
      </section>
    </section>

    <section class="panel log-panel" aria-label="Logs">
      <div class="log-header">
        <h2>Logs</h2>
        <button type="button" id="copy-log">Copiar</button>
      </div>
      <ol id="logs" aria-live="polite"></ol>
    </section>
  </main>
</body>

</html>
